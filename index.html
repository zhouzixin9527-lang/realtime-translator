<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f23">
    <title>阿鑫翻译助手</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23; min-height: 100vh; color: #fff; overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; padding: 12px 16px; }

        /* 顶部 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 8px; }
        .header h1 { font-size: 1rem; color: #7c8fff; }
        .auto-speak-toggle {
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #666;
        }
        .auto-speak-toggle input { accent-color: #7c8fff; }

        /* 语言切换 */
        .lang-bar {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 8px 0; margin-bottom: 6px;
            background: rgba(255,255,255,0.03); border-radius: 12px;
        }
        .lang-label { font-size: 0.85rem; color: #aaa; font-weight: 500; }
        .lang-label.active { color: #7c8fff; }
        .swap-btn {
            background: rgba(124,143,255,0.15); border: 1px solid rgba(124,143,255,0.3);
            color: #7c8fff; width: 32px; height: 32px; border-radius: 50%; font-size: 0.9rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .swap-btn:active { transform: rotate(180deg); background: rgba(124,143,255,0.3); }

        /* 翻译区域 */
        .translation-area { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; min-height: 0; }
        .panel {
            flex: 1; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px 14px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .panel-title { font-size: 0.75rem; color: #555; display: flex; align-items: center; gap: 5px; letter-spacing: 0.5px; }
        .panel-actions { display: flex; gap: 6px; }
        .action-btn {
            background: rgba(255,255,255,0.06); border: none; color: #666;
            width: 28px; height: 28px; border-radius: 50%; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-btn:active { background: rgba(255,255,255,0.15); color: #fff; }
        .action-btn.speaking { color: #7c8fff; background: rgba(124,143,255,0.2); animation: pulse2 1s infinite; }
        @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .panel-content {
            flex: 1; font-size: 1.2rem; line-height: 1.5; overflow-y: auto;
            word-break: break-word; -webkit-overflow-scrolling: touch;
        }
        .panel.source .panel-content { color: #e0e0e0; }
        .panel.target .panel-content { color: #7c8fff; }
        .placeholder { color: #333; font-size: 0.85rem; }
        .interim { color: #666; font-style: italic; }

        /* 底部 */
        .controls { padding: 8px 0 4px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .text-input-area { display: flex; gap: 6px; width: 100%; }
        .text-input {
            flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 14px; border-radius: 22px; font-size: 0.85rem; outline: none;
        }
        .text-input::placeholder { color: #444; }
        .send-btn {
            background: #7c8fff; border: none; color: #fff;
            padding: 10px 18px; border-radius: 22px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
        }
        .mic-row { display: flex; align-items: center; gap: 16px; }
        .mic-button {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #7c8fff 0%, #5a6fff 100%);
            color: #fff; font-size: 1.6rem; cursor: pointer;
            box-shadow: 0 2px 16px rgba(124,143,255,0.4);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .mic-button:active { transform: scale(0.93); }
        .mic-button.recording {
            background: linear-gradient(135deg, #ff5757 0%, #ff3333 100%);
            box-shadow: 0 2px 24px rgba(255,87,87,0.5); animation: breathe 1.5s infinite;
        }
        @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
        .mic-hint { font-size: 0.7rem; color: #444; }

        /* 历史 */
        .history-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;opacity:0;visibility:hidden;transition:all .3s; }
        .history-overlay.open { opacity:1;visibility:visible; }
        .history-panel {
            position:fixed;top:0;right:-100%;width:85%;max-width:360px;height:100vh;
            background:#0f0f23;z-index:1000;transition:right .3s;padding:20px;overflow-y:auto;
        }
        .history-panel.open { right:0; }
        .history-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06); }
        .history-header h2 { font-size:1rem;color:#7c8fff; }
        .close-history { background:none;border:none;color:#666;font-size:1.5rem;cursor:pointer; }
        .history-item { background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 12px;margin-bottom:8px; }
        .history-source { color:#ccc;font-size:0.85rem;margin-bottom:4px; }
        .history-target { color:#7c8fff;font-size:0.85rem; }
        .history-meta { font-size:0.65rem;color:#333;margin-top:4px;display:flex;justify-content:space-between;align-items:center; }
        .history-speak-btn { background:none;border:none;color:#555;font-size:0.75rem;cursor:pointer; }
        .history-speak-btn:active { color:#7c8fff; }
        .history-empty { text-align:center;color:#333;padding:30px 0; }
        .clear-history { background:rgba(255,77,77,0.1);border:none;color:#ff4d4d;padding:8px;border-radius:8px;width:100%;margin-top:12px;cursor:pointer;font-size:0.8rem; }

        .toast { position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(124,143,255,0.9);color:#fff;padding:8px 18px;border-radius:18px;font-size:0.8rem;opacity:0;transition:all .3s;z-index:2000; }
        .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
        .error-banner { background:rgba(255,77,77,0.15);border:1px solid rgba(255,77,77,0.3);color:#ff5757;padding:8px;border-radius:8px;text-align:center;font-size:0.75rem;margin-bottom:8px;display:none; }
        .error-banner.show { display:block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-banner" id="errorBanner"></div>
        <div class="header">
            <h1>🎙️ 翻译助手</h1>
            <label class="auto-speak-toggle">
                <input type="checkbox" id="autoSpeak" checked> 自动朗读
            </label>
        </div>
        <div class="lang-bar">
            <span class="lang-label active" id="srcLabel">🇨🇳 中文</span>
            <button class="swap-btn" id="swapBtn">⇄</button>
            <span class="lang-label" id="tgtLabel">🇺🇸 English</span>
        </div>
        <div class="translation-area">
            <div class="panel source">
                <div class="panel-header">
                    <div class="panel-title"><span id="srcFlag">🇨🇳</span><span id="srcLangName">中文</span></div>
                    <div class="panel-actions">
                        <button class="action-btn" id="speakSource" title="朗读原文">🔊</button>
                        <button class="action-btn" id="copySource" title="复制">📋</button>
                    </div>
                </div>
                <div class="panel-content" id="sourceText"><span class="placeholder">点击麦克风或输入文字...</span></div>
            </div>
            <div class="panel target">
                <div class="panel-header">
                    <div class="panel-title"><span id="tgtFlag">🇺🇸</span><span id="tgtLangName">English</span></div>
                    <div class="panel-actions">
                        <button class="action-btn" id="speakTarget" title="朗读译文">🔊</button>
                        <button class="action-btn" id="copyTarget" title="复制">📋</button>
                        <button class="action-btn" id="historyToggle" title="历史">📜</button>
                    </div>
                </div>
                <div class="panel-content" id="targetText"><span class="placeholder">翻译结果</span></div>
            </div>
        </div>
        <div class="controls">
            <div class="text-input-area">
                <input class="text-input" id="textInput" placeholder="输入文字翻译..." />
                <button class="send-btn" id="sendBtn">翻译</button>
            </div>
            <div class="mic-row">
                <button class="mic-button" id="micButton">🎤</button>
            </div>
            <div class="mic-hint" id="micHint">点击开始语音翻译</div>
        </div>
    </div>

    <div class="history-overlay" id="historyOverlay"></div>
    <div class="history-panel" id="historyPanel">
        <div class="history-header"><h2>📜 翻译历史</h2><button class="close-history" id="closeHistory">×</button></div>
        <div id="historyList"></div>
        <button class="clear-history" id="clearHistory">清空历史</button>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const LANG = {
            zh2en: { src:'zh-CN', tgt:'en-US', srcCode:'zh', tgtCode:'en', srcF:'🇨🇳', tgtF:'🇺🇸', srcN:'中文', tgtN:'English', lp:'zh-CN|en' },
            en2zh: { src:'en-US', tgt:'zh-CN', srcCode:'en', tgtCode:'zh', srcF:'🇺🇸', tgtF:'🇨🇳', srcN:'English', tgtN:'中文', lp:'en|zh-CN' }
        };

        let S = {
            mode: 'zh2en', recording: false, recognition: null,
            sourceText: '', targetText: '',
            lastInterim: '', interimTimer: null, ttsQueue: [], isSpeaking: false,
            history: JSON.parse(localStorage.getItem('transHist3') || '[]')
        };

        const cfg = () => LANG[S.mode];
        const $ = id => document.getElementById(id);
        const el = {
            micBtn:$('micButton'), micHint:$('micHint'), micStatus:$('micStatus'),
            srcText:$('sourceText'), tgtText:$('targetText'),
            speakSrc:$('speakSource'), speakTgt:$('speakTarget'),
            copySrc:$('copySource'), copyTgt:$('copyTarget'),
            srcFlag:$('srcFlag'), tgtFlag:$('tgtFlag'), srcName:$('srcLangName'), tgtName:$('tgtLangName'),
            srcLabel:$('srcLabel'), tgtLabel:$('tgtLabel'),
            swapBtn:$('swapBtn'), textInput:$('textInput'), sendBtn:$('sendBtn'),
            autoSpeak:$('autoSpeak'), histToggle:$('historyToggle'),
            histPanel:$('historyPanel'), histOverlay:$('historyOverlay'),
            closeHist:$('closeHistory'), histList:$('historyList'), clearHist:$('clearHistory'),
            error:$('errorBanner'), toast:$('toast')
        };

        function init() {
            initSR();
            el.micBtn.onclick = toggleRec;
            el.swapBtn.onclick = swapLang;
            el.sendBtn.onclick = sendText;
            el.textInput.onkeydown = e => { if(e.key==='Enter') sendText(); };
            el.speakSrc.onclick = () => speak(S.sourceText, cfg().srcCode);
            el.speakTgt.onclick = () => speak(S.targetText, cfg().tgtCode);
            el.copySrc.onclick = () => copy(S.sourceText);
            el.copyTgt.onclick = () => copy(S.targetText);
            el.histToggle.onclick = () => { el.histPanel.classList.toggle('open'); el.histOverlay.classList.toggle('open'); };
            el.histOverlay.onclick = el.closeHist.onclick = () => { el.histPanel.classList.remove('open'); el.histOverlay.classList.remove('open'); };
            el.clearHist.onclick = () => { if(confirm('清空？')){ S.history=[]; localStorage.removeItem('transHist3'); renderHist(); } };
            updateLangUI(); renderHist();
        }

        function updateLangUI() {
            const c = cfg();
            el.srcFlag.textContent = c.srcF; el.tgtFlag.textContent = c.tgtF;
            el.srcName.textContent = c.srcN; el.tgtName.textContent = c.tgtN;
            el.srcLabel.textContent = c.srcF+' '+c.srcN; el.tgtLabel.textContent = c.tgtF+' '+c.tgtN;
            el.textInput.placeholder = `输入${c.srcN}翻译...`;
            el.micHint.textContent = `点击开始${c.srcN}语音翻译`;
        }

        // ===== 语音识别 =====
        function initSR() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { el.micBtn.disabled = true; showErr('请用Chrome浏览器'); return; }
            S.recognition = new SR();
            S.recognition.continuous = true;
            S.recognition.interimResults = true;

            S.recognition.onresult = e => {
                let interim = '', final = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    const t = e.results[i][0].transcript;
                    e.results[i].isFinal ? final += t : interim += t;
                }
                if (final) {
                    S.sourceText += final + ' ';
                    realtimeTranslate(final.trim(), true);
                } else if (interim) {
                    realtimeTranslate(interim.trim(), false);
                }
            };
            S.recognition.onend = () => { if (S.recording) try { S.recognition.start(); } catch(e){} };
            S.recognition.onerror = e => {
                if (e.error==='not-allowed') showErr('请允许麦克风权限');
                if (e.error!=='aborted' && e.error!=='no-speech') stopRec();
            };
        }

        function toggleRec() { S.recording ? stopRec() : startRec(); }
        function startRec() {
            if (!S.recognition) return;
            S.recognition.lang = cfg().src;
            try {
                S.recognition.start(); S.recording = true;
                el.micBtn.classList.add('recording'); el.micBtn.textContent = '⏹️';
                el.micHint.textContent = '正在听... 点击停止';
                S.sourceText = ''; S.targetText = '';
                el.srcText.innerHTML = '<span class="placeholder">正在听...</span>';
                el.tgtText.innerHTML = '<span class="placeholder">翻译中...</span>';
            } catch(e) { showErr('启动失败'); }
        }
        function stopRec() {
            if (S.recognition) S.recognition.stop();
            S.recording = false;
            el.micBtn.classList.remove('recording'); el.micBtn.textContent = '🎤';
            el.micHint.textContent = `点击开始${cfg().srcN}语音翻译`;
        }

        // ===== 实时翻译 =====
        function realtimeTranslate(text, isFinal) {
            if (!text) return;
            if (isFinal) {
                clearTimeout(S.interimTimer);
                doTranslate(text, true);
            } else {
                if (text === S.lastInterim) return;
                S.lastInterim = text;
                clearTimeout(S.interimTimer);
                S.interimTimer = setTimeout(() => doTranslate(text, false), 250);
            }
        }

        async function doTranslate(text, isFinal) {
            const c = cfg();
            if (isFinal) {
                el.srcText.innerHTML = esc(S.sourceText);
                try {
                    const r = await gTrans(text, c.srcCode, c.tgtCode);
                    S.targetText += r + ' ';
                    el.tgtText.innerHTML = esc(S.targetText);
                    saveHist(text, r);
                    if (el.autoSpeak.checked) speak(r, c.tgtCode);
                } catch(e) {
                    try {
                        const r = await mmTrans(text, c.lp);
                        S.targetText += r + ' ';
                        el.tgtText.innerHTML = esc(S.targetText);
                        saveHist(text, r);
                        if (el.autoSpeak.checked) speak(r, c.tgtCode);
                    } catch(e2) { console.error(e2); }
                }
            } else {
                el.srcText.innerHTML = esc(S.sourceText) + `<span class="interim">${esc(text)}</span>`;
                try {
                    const r = await gTrans(text, c.srcCode, c.tgtCode);
                    el.tgtText.innerHTML = esc(S.targetText) + `<span class="interim">${esc(r)}</span>`;
                } catch(e) {}
            }
        }

        // ===== 翻译API =====
        async function gTrans(text, sl, tl) {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
            const d = await r.json();
            if (d && d[0]) { let s=''; for(const p of d[0]) if(p[0]) s+=p[0]; if(s) return s; }
            throw new Error('gTrans fail');
        }
        async function mmTrans(text, lp) {
            const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${lp}`);
            const d = await r.json();
            if (d.responseStatus===200 && d.responseData) return d.responseData.translatedText;
            throw new Error('mmTrans fail');
        }

        // ===== TTS语音合成 =====
        function speak(text, lang) {
            if (!text || !text.trim()) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text.trim());
            u.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
            u.rate = 1.0;
            u.pitch = 1.0;
            // 尝试选一个好的声音
            const voices = speechSynthesis.getVoices();
            const match = voices.find(v => v.lang.startsWith(u.lang));
            if (match) u.voice = match;
            // 朗读时高亮按钮
            const btn = lang === cfg().tgtCode.replace('-CN','').replace('-US','') ? el.speakTgt : el.speakSrc;
            btn.classList.add('speaking');
            u.onend = () => btn.classList.remove('speaking');
            u.onerror = () => btn.classList.remove('speaking');
            speechSynthesis.speak(u);
        }

        // 预加载声音列表
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

        // ===== 交互 =====
        function swapLang() {
            S.mode = S.mode === 'zh2en' ? 'en2zh' : 'zh2en';
            updateLangUI();
            const tmp = S.sourceText; S.sourceText = S.targetText; S.targetText = tmp;
            el.srcText.innerHTML = S.sourceText ? esc(S.sourceText) : '<span class="placeholder">点击麦克风或输入文字...</span>';
            el.tgtText.innerHTML = S.targetText ? esc(S.targetText) : '<span class="placeholder">翻译结果</span>';
            showToast(`${cfg().srcN} → ${cfg().tgtN}`);
        }

        function sendText() {
            const t = el.textInput.value.trim();
            if (!t) return;
            S.sourceText += t + ' ';
            realtimeTranslate(t, true);
            el.textInput.value = '';
        }

        function copy(text) {
            if (!text.trim()) return;
            navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
        }

        // ===== 历史 =====
        function saveHist(src, tgt) {
            const c = cfg();
            S.history.unshift({ src, tgt, mode: c.srcN+'→'+c.tgtN, time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), tgtLang: c.tgtCode });
            if (S.history.length > 80) S.history = S.history.slice(0, 80);
            localStorage.setItem('transHist3', JSON.stringify(S.history));
            renderHist();
        }
        function renderHist() {
            if (!S.history.length) { el.histList.innerHTML = '<div class="history-empty">暂无记录</div>'; return; }
            el.histList.innerHTML = S.history.map(i => `
                <div class="history-item">
                    <div class="history-source">${esc(i.src)}</div>
                    <div class="history-target">${esc(i.tgt)}</div>
                    <div class="history-meta">
                        <span>${i.mode} · ${i.time}</span>
                        <button class="history-speak-btn" onclick="speak('${esc(i.tgt).replace(/'/g,"\\'")}','${i.tgtLang}')">🔊 朗读</button>
                    </div>
                </div>
            `).join('');
        }

        // ===== 工具 =====
        function showErr(m) { el.error.textContent=m; el.error.classList.add('show'); setTimeout(()=>el.error.classList.remove('show'),4000); }
        function showToast(m) { el.toast.textContent=m; el.toast.classList.add('show'); setTimeout(()=>el.toast.classList.remove('show'),1500); }
        function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
